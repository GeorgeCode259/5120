<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Sun Body -->
  <circle cx="50" cy="50" r="35" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
  
  <!-- Rays -->
  <g stroke="#FFD700" stroke-width="5" stroke-linecap="round">
    <line x1="50" y1="10" x2="50" y2="5" />
    <line x1="50" y1="90" x2="50" y2="95" />
    <line x1="10" y1="50" x2="5" y2="50" />
    <line x1="90" y1="50" x2="95" y2="50" />
    <line x1="21.7" y1="21.7" x2="18.2" y2="18.2" />
    <line x1="78.3" y1="78.3" x2="81.8" y2="81.8" />
    <line x1="21.7" y1="78.3" x2="18.2" y2="81.8" />
    <line x1="78.3" y1="21.7" x2="81.8" y2="18.2" />
  </g>

  <!-- Sunglasses -->
  <g fill="#333">
    <!-- Left Lens -->
    <path d="M25,45 Q25,60 40,60 Q55,60 55,45 Z" />
    <!-- Right Lens -->
    <path d="M60,45 Q60,60 75,60 Q90,60 90,45 Z" />
    <!-- Bridge -->
    <rect x="52" y="48" width="11" height="3" />
    <!-- Frame Top -->
    <rect x="25" y="43" width="30" height="4" />
    <rect x="60" y="43" width="30" height="4" />
  </g>
  
  <!-- Smile -->
  <path d="M35,70 Q50,80 65,70" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round" />
</svg>